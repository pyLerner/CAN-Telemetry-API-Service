# Рабочий конфиг telemetry-client (копируется install.sh в /opt/telemetry-client/etc/).
# При запуске door_logger.py файл по -c пересоздаётся с учётом CLI.

[client]
api-server-host = 192.168.9.220
api-server-port = 7080
log-path = /opt/telemetry-client/logs/doors.log
poll-interval-sec = 1
write-unknown-state = false
write-initial-state = false
timeout = 0
timezone = utc
