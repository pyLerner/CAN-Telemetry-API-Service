# Параметры и процедура нового декодера / [Mapping]: см. doc/CONFIGURATION.md

[API]
Host = "0.0.0.0"
HTTP_Port = 7080
Workers = 1

[System]
ProgramDirectory = "/usr/local/can-telemetry"
LogDir = "logs"
DisableCan = false
debug = false

[CAN]
Interface = "socketcan"
Channel = "can0"
Profile = "bus-fms"
Bitrate = 250000
FD = false
Decoder = "t856"
ReceiveTimeout = 0.5

[Cache]
StaleAfterSeconds = 30.0
DefaultDoorState = "unknown"
CoalesceByFrame = true
DoorCount = 6
# MinIntervalPerPgnMs = 100
# ProcessEveryNFrames = 1

[Telemetry]
TemperatureMode = "can"
SimTargetInside = 22.0
SimTargetOutside = 15.0
SimTickSeconds = 5.0
SimStepC = 0.1
SimMaxDriftC = 2.0

[Mapping.temperature]
# Размер очереди для усреднения последних значений каждого выбранного датчика.
queue-len = 5
# true: усредняем все выбранные датчики салона в один inside.
# false: разрешен только один датчик в sensors; иначе логируется ошибка и режим принудительно включается.
average-all-zone = true
# Какие датчики салона участвуют в расчете inside: "all" или список [1, 2].
sensors = "all"
# Что отдавать в API при неизвестном/устаревшем inside.
# В TOML null-литерала нет; строка "null" трактуется как отсутствие значения.
interior-default-value = "null"
# Что отдавать в API при неизвестном/устаревшем outside.
# В TOML null-литерала нет; строка "null" трактуется как отсутствие значения.
exterior-default-value = "null"

# Порог нормализации inside для API.
interior-normalize-min = -40
interior-normalize-max = 210
# Значения, которые будут отданы в API если inside вышел за пороги.
interior-normalize-fallback-min = -50
interior-normalize-fallback-max = 250

# Порог нормализации outside для API.
exterior-normalize-min = -40
exterior-normalize-max = 210
# Значения, которые будут отданы в API если outside вышел за пороги.
exterior-normalize-fallback-min = -50
exterior-normalize-fallback-max = 250

[Mapping.doors]
# Эмпирическая per-door карта для 0x1BFFD880 (по 1-door..6-door.txt).
# Единственный источник количества дверей: [Cache].DoorCount.
# По умолчанию используются 2-битные поля:
# d1=(byte0,shift2), d2=(byte0,shift4), d3=(byte0,shift6),
# d4=(byte4,shift2), d5=(byte4,shift4), d6=(byte4,shift6).
# field=3 => open, field in {0,1,2} => close.
unknown-state = "unknown"

[Mapping.doors.door-map."1"]
byte = 0
shift = 2
open-values = [3]
close-values = [0, 1, 2]

[Mapping.doors.door-map."2"]
byte = 0
shift = 4
open-values = [3]
close-values = [0, 1, 2]

[Mapping.doors.door-map."3"]
byte = 0
shift = 6
open-values = [3]
close-values = [0, 1, 2]

[Mapping.doors.door-map."4"]
byte = 4
shift = 2
open-values = [3]
close-values = [0, 1, 2]

[Mapping.doors.door-map."5"]
byte = 4
shift = 4
open-values = [3]
close-values = [0, 1, 2]

[Mapping.doors.door-map."6"]
byte = 4
shift = 6
open-values = [3]
close-values = [0, 1, 2]

[Mapping.ids]
# Кадры из полевого дампа (can0-doors-dump.txt): двери и IO приходят с другими ID.
# Для T856 можно задавать список ID в hex или decimal.
doors = ["0x1BFFD880"]
io = ["0x1BFFD980"]
# Температуру оставляем по спецификации T856 до подтверждения в шине.
temperatures1 = ["0x18FF6227"]
# arbitration-id: точное совпадение ID, pgn: совпадение по J1939 PGN.
match-mode = "arbitration-id"

[Mapping.reverse]
# Код "Назад" в поле ETC2 (п.2.5 IO). Только при этом коде reverse=true.
reverse-code = 124
