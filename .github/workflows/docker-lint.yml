name: docker-lint

on:
  push:
    paths:
      - "docker/**"
      - ".github/workflows/docker-lint.yml"
  pull_request:
    paths:
      - "docker/**"
      - ".github/workflows/docker-lint.yml"

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: warning
